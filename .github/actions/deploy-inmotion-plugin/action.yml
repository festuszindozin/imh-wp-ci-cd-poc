name: Deploy InMotion CI/CD PoC plugin
description: Rsync the plugin over SSH and optionally activate with WP-CLI. Expects ssh-agent already loaded in the job (see workflow).

inputs:
  ssh_host:
    required: true
  ssh_user:
    required: true
  ssh_remote_plugin_path:
    description: Absolute path to the plugin directory on the server (no trailing slash)
    required: true
  wordpress_root:
    description: Absolute path to WordPress root for WP-CLI (--path). Leave empty to skip activation.
    required: false
    default: ''
  wp_cli_bin:
    description: WP-CLI binary name or path on the remote (default wp)
    required: false
    default: 'wp'

runs:
  using: composite
  steps:
    - name: Validate deploy inputs
      shell: bash
      env:
        HOST: ${{ inputs.ssh_host }}
        USER: ${{ inputs.ssh_user }}
        REMOTE_PLUGIN_PATH: ${{ inputs.ssh_remote_plugin_path }}
      run: |
        set -euo pipefail
        missing=0
        if [ -z "${HOST}" ]; then
          echo "::error::SSH_HOST is empty. Add the SSH hostname as a secret."
          missing=1
        fi
        if [ -z "${USER}" ]; then
          echo "::error::SSH_USER is empty. Add the SSH username as a secret."
          missing=1
        fi
        if [ -z "${REMOTE_PLUGIN_PATH}" ]; then
          echo "::error::SSH_REMOTE_PLUGIN_PATH is empty. Add the absolute server path to wp-content/plugins/inmotion-ci-cd-poc as a secret."
          missing=1
        fi
        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

    - name: Trust host key and rsync
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        REMOTE_PLUGIN_PATH: ${{ inputs.ssh_remote_plugin_path }}
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
        rsync -avzr --delete \
          wp-content/plugins/inmotion-ci-cd-poc/ \
          "${SSH_USER}@${SSH_HOST}:${REMOTE_PLUGIN_PATH}/"

    - name: Activate plugin (WP-CLI, optional)
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        WORDPRESS_ROOT: ${{ inputs.wordpress_root }}
        WP_CLI_BIN: ${{ inputs.wp_cli_bin }}
      run: |
        set -euo pipefail
        if [ -z "${WORDPRESS_ROOT}" ]; then
          echo "wordpress_root not set; skipping WP-CLI activate."
          exit 0
        fi
        BIN="${WP_CLI_BIN:-wp}"
        REMOTE="${SSH_USER}@${SSH_HOST}"
        ssh -o BatchMode=yes "$REMOTE" "${BIN} plugin activate inmotion-ci-cd-poc --path=${WORDPRESS_ROOT}"
