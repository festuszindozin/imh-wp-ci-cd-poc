name: Test and deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  deploy_production:
    name: Deploy to production (main)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record commit on the build that will be deployed
        run: printf '%s' "$GITHUB_SHA" > wp-content/plugins/inmotion-ci-cd-poc/includes/deploy-build.txt

      - name: Require SSH secrets (before loading key)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_REMOTE_PLUGIN_PATH: ${{ secrets.SSH_REMOTE_PLUGIN_PATH }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::SSH_PRIVATE_KEY is empty. Add it under Settings → Secrets and variables → Actions, or under Environments → production → Environment secrets. Paste the full PEM including BEGIN/END lines."
            missing=1
          fi
          if [ -z "${SSH_HOST}" ]; then echo "::error::SSH_HOST is empty."; missing=1; fi
          if [ -z "${SSH_USER}" ]; then echo "::error::SSH_USER is empty."; missing=1; fi
          if [ -z "${SSH_REMOTE_PLUGIN_PATH}" ]; then echo "::error::SSH_REMOTE_PLUGIN_PATH is empty."; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          if ! printf '%s' "${SSH_PRIVATE_KEY}" | grep -q 'BEGIN'; then
            echo "::error::SSH_PRIVATE_KEY does not look like a PEM key (missing BEGIN line)."
            exit 1
          fi

      - name: Load SSH deploy key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy plugin (rsync + optional WP-CLI)
        uses: ./.github/actions/deploy-inmotion-plugin
        with:
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_remote_plugin_path: ${{ secrets.SSH_REMOTE_PLUGIN_PATH }}
          wordpress_root: ${{ vars.WORDPRESS_ROOT }}
          wp_cli_bin: ${{ vars.WP_CLI_BIN }}

  deploy_staging:
    name: Deploy to staging (staging branch)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record commit on the build that will be deployed
        run: printf '%s' "$GITHUB_SHA" > wp-content/plugins/inmotion-ci-cd-poc/includes/deploy-build.txt

      - name: Require SSH secrets (before loading key)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_REMOTE_PLUGIN_PATH: ${{ secrets.SSH_REMOTE_PLUGIN_PATH }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::SSH_PRIVATE_KEY is empty. Add it under Settings → Secrets and variables → Actions, or under Environments → staging → Environment secrets."
            missing=1
          fi
          if [ -z "${SSH_HOST}" ]; then echo "::error::SSH_HOST is empty."; missing=1; fi
          if [ -z "${SSH_USER}" ]; then echo "::error::SSH_USER is empty."; missing=1; fi
          if [ -z "${SSH_REMOTE_PLUGIN_PATH}" ]; then echo "::error::SSH_REMOTE_PLUGIN_PATH is empty."; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          if ! printf '%s' "${SSH_PRIVATE_KEY}" | grep -q 'BEGIN'; then
            echo "::error::SSH_PRIVATE_KEY does not look like a PEM key (missing BEGIN line)."
            exit 1
          fi

      - name: Load SSH deploy key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy plugin (rsync + optional WP-CLI)
        uses: ./.github/actions/deploy-inmotion-plugin
        with:
          ssh_host: ${{ secrets.SSH_HOST }}
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_remote_plugin_path: ${{ secrets.SSH_REMOTE_PLUGIN_PATH }}
          wordpress_root: ${{ vars.WORDPRESS_ROOT }}
          wp_cli_bin: ${{ vars.WP_CLI_BIN }}
